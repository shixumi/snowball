name: Snowball
options:
  bundleIdPrefix: com.snowball
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    # Xcode 15+ sandboxes build-phase scripts by default, which breaks the Gradle
    # framework build. Disable it so the embedAndSignAppleFrameworkForXcode script runs.
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  Snowball:
    type: application
    platform: iOS
    sources:
      - path: Snowball
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snowball.app
        PRODUCT_NAME: Snowball
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Snowball/Info.plist
        # The Kotlin framework is a static framework named ComposeApp, produced by
        # the Gradle task below into composeApp/build/xcode-frameworks/<config>/<sdk>.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
    preBuildScripts:
      - name: "Build Compose (Kotlin) framework"
        basedOnDependencyAnalysis: false
        script: |
          # Xcode build scripts don't inherit the shell's JAVA_HOME, so pin a JDK
          # Gradle/AGP supports (21, then 17) instead of falling back to a too-new system JDK.
          export JAVA_HOME="$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 17 2>/dev/null || echo "$JAVA_HOME")"
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
